<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codorax Link - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @layer base {
            html {
                font-family: 'Inter', sans-serif;
            }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-900 via-blue-900 to-purple-900">
    <!-- Header -->
    <header class="bg-white/5 backdrop-blur-sm border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <h1 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">
                            Codorax Link Admin
                        </h1>
                    </div>
                    <div class="hidden md:block">
                        <div class="ml-10 flex items-baseline space-x-4">
                            <a href="/admin.html" class="px-3 py-2 rounded-md text-sm font-medium text-white/70 hover:text-white focus:outline-none focus:ring-2 focus:ring-white/20">
                                Dashboard
                            </a>
                            <a href="/" class="px-3 py-2 rounded-md text-sm font-medium text-white/60 hover:text-white focus:outline-none focus:ring-2 focus:ring-white/20">
                                URL Shortener
                            </a>
                        </div>
                    </div>
                </div>
                <div class="flex items-center">
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center px-3">
                            <div class="h-2 w-2 rounded-full bg-green-400 animate-pulse"></div>
                            <span class="ml-2 text-xs text-white/60">Online</span>
                        </div>
                        <button class="ml-3 flex h-9 w-9 items-center justify-center rounded-full bg-white/10 hover:bg-white/20 focus:outline-none focus:ring-2 focus-ring-white/20">
                            <span class="sr-only">View notifications</span>
                            <!-- Icon placeholder -->
                            <svg class="h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.108V11a2.002 2.002 0 10-4 0v3.108a2.032 2.032 0 01-1.405-1.405H5a2.002 2.002 0 10-4 0v3.108a2.032 2.032 0 01-1.405-1.405H5a2.002 2.002 0 10-4 0v3.108a2.032 2.032 0 011.405 1.405h10"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- Welcome Header -->
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">
                    Dashboard Overview
                </h2>
                <p class="mt-2 text-sm text-white/70">
                    Monitor your URL shortening platform's performance and user activity
                </p>
            </div>

            <!-- Stats Cards -->
            <div class="grid gap-6 mb-8">
                <div class="grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
                    <!-- Visitors Card -->
                    <div class="relative bg-white/10 backdrop-blur-md border border-white/20 rounded-xl p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <h3 class="text-sm font-medium text-white/60">Visitors (24h)</h3>
                                <p id="visitors-count" class="text-3xl font-bold text-white mt-2">0</p>
                            </div>
                            <div class="flex h-10 w-10 items-center justify-center bg-blue-500/20 rounded-lg text-blue-400">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-5 h-5">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-9z"></path>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- Users Card -->
                    <div class="relative bg-white/10 backdrop-blur-md border border-white/20 rounded-xl p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <h3 class="text-sm font-medium text-white/60">Registered Users</h3>
                                <p id="users-count" class="text-3xl font-bold text-white mt-2">0</p>
                            </div>
                            <div class="flex h-10 w-10 items-center justify-center bg-purple-500/20 rounded-lg text-purple-400">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-5 h-5">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112-3v1zm0 0h6v-2a6 6 0 00-9-3.006V15a3 3 0 016 0v2a6 6 0 009 3.006v1zm-10-3V11a6 6 0 0112 0v2.354a4 4 0 110 5.292m0-5.292v1"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M8 10h.01M12 10h.01M16 10h.01"></path>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- Links Card -->
                    <div class="relative bg-white/10 backdrop-blur-md border border-white/20 rounded-xl p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <h3 class="text-sm font-medium text-white/60">Total Links</h3>
                                <p id="links-count" class="text-3xl font-bold text-white mt-2">0</p>
                            </div>
                            <div class="flex h-10 w-10 items-center justify-center bg-green-500/20 rounded-lg text-green-400">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-5 h-5">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7 20h10a2 2 0 002-2V6a2 2 0 00-2-2H7a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- User Management and Analytics -->
            <div class="grid gap-8">
                <!-- User Management -->
                <div class="col-span-1 lg:col-span-1">
                    <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-xl p-6">
                        <h3 class="text-lg font-semibold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400 mb-6">
                            User Management
                        </h3>
                        <div id="users-table-container" class="space-y-4">
                            <div class="text-center py-8">
                                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500 border-t-2 border-transparent mx-auto"></div>
                                <p class="mt-3 text-sm text-white/60">Loading users...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Analytics Chart -->
                <div class="col-span-1 lg:col-span-2">
                    <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-xl p-6">
                        <h3 class="text-lg font-semibold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400 mb-6">
                            Daily Clicks Trend
                        </h3>
                        <div class="h-64">
                            <canvas id="clicksChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

<script>
    // Chart.js instance
    let clicksChart = null;

    // Fetch dashboard stats
    async function loadDashboardStats() {
        try {
            const response = await fetch('/api/admin/stats', {
                credentials: 'include'
            });

            if (!response.ok) {
                throw new Error('Failed to fetch dashboard stats');
            }

            const data = await response.json();

            // Update stats cards
            document.getElementById('visitors-count').textContent = data.clicks24h.toLocaleString();
            document.getElementById('users-count').textContent = data.totalUsers.toLocaleString();
            document.getElementById('links-count').textContent = data.totalLinks.toLocaleString();

            // Load chart data
            await loadClicksChartData();
        } catch (error) {
            console.error('Error loading dashboard stats:', error);
            // Show error state in UI
            document.getElementById('visitors-count').textContent = 'Error';
            document.getElementById('users-count').textContent = 'Error';
            document.getElementById('links-count').textContent = 'Error';
        }
    }

    // Fetch and render clicks chart
    async function loadClicksChartData() {
        try {
            // For demo purposes, we'll generate some sample data
            // In a real implementation, you'd fetch this from an analytics endpoint
            const labels = [];
            const data = [];

            // Generate last 7 days
            for (let i = 6; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                labels.push(date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
                // Random data for demo - replace with real API call
                data.push(Math.floor(Math.random() * 100));
            }

            // Destroy existing chart if it exists
            if (clicksChart) {
                clicksChart.destroy();
            }

            // Create new chart
            const ctx = document.getElementById('clicksChart').getContext('2d');
            clicksChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Daily Clicks',
                        data: data,
                        borderColor: 'rgb(99, 102, 241)',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        tension: 0.3,
                        fill: true,
                        pointBackgroundColor: 'rgb(99, 102, 241)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgb(99, 102, 241)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: 'text-white/80'
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: 'text-white/60'
                            }
                        },
                        y: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: 'text-white/60'
                            }
                        }
                    }
                }
            });
        } catch (error) {
            console.error('Error loading chart data:', error);
        }
    }

    // Fetch users for table
    async function loadUsersTable() {
        try {
            const response = await fetch('/api/admin/users', {
                credentials: 'include'
            });

            if (!response.ok) {
                throw new Error('Failed to fetch users');
            }

            const data = await response.json();
            const container = document.getElementById('users-table-container');

            if (!data.users || data.users.length === 0) {
                container.innerHTML = '<p class="text-center py-4 text-white/60">No users found</p>';
                return;
            }

            // Create table
            let tableHTML = `
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-white/10">
                        <thead>
                            <tr class="text-left">
                                <th class="px-4 py-3 text-xs font-medium text-white/50 uppercase tracking-wider">Email</th>
                                <th class="px-4 py-3 text-xs font-medium text-white/50 uppercase tracking-wider">Role</th>
                                <th class="px-4 py-3 text-xs font-medium text-white/50 uppercase tracking-wider">Joined</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-white/10">
            `;

            data.users.forEach(user => {
                const joinedDate = new Date(user.createdAt).toLocaleDateString();
                tableHTML += `
                    <tr class="hover:bg-white/5">
                        <td class="px-4 py-3 text-sm text-white/90">${user.email}</td>
                        <td class="px-4 py-3 text-sm text-white/90 text-capitalize">${user.role}</td>
                        <td class="px-4 py-3 text-sm text-white/90">${joinedDate}</td>
                    </tr>
                `;
            });

            tableHTML += `
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = tableHTML;
        } catch (error) {
            console.error('Error loading users table:', error);
            const container = document.getElementById('users-table-container');
            container.innerHTML = '<p class="text-center py-4 text-red-400">Failed to load users</p>';
        }
    }

    // Initialize dashboard
    async function initDashboard() {
        await loadDashboardStats();
        await loadUsersTable();
    }

    // Load dashboard on page load
    document.addEventListener('DOMContentLoaded', initDashboard);

    // Refresh data every 30 seconds
    setInterval(initDashboard, 30000);
</script>
</body>
</html>
