<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codorax Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @layer base {
            html {
                font-family: 'Inter', sans-serif;
            }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-900 via-blue-900 to-purple-900 flex items-center justify-center p-4">
    <div class="w-full max-w-xl">
        <!-- Glassmorphism Container -->
        <div class="relative bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-8 shadow-inner">
            <!-- Header with User Info -->
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">
                        Codorax Link
                    </h1>
                    <p class="mt-1 text-sm text-white/70">Professional URL Shortener</p>
                </div>
                <div id="user-info" class="hidden flex items-center space-x-3">
                    <div class="flex items-center">
                        <div class="h-8 w-8 rounded-full bg-white/20 flex items-center justify-center text-sm font-medium">
                            <span id="user-initials">U</span>
                        </div>
                        <div class="space-y-1">
                            <p class="text-sm font-medium text-white" id="user-name">User Name</p>
                            <p class="text-xs text-white/60" id="user-email">user@example.com</p>
                        </div>
                    </div>
                    <button
                        id="logout-btn"
                        class="px-3 py-2 bg-red-500/20 hover:bg-red-500/30 text-red-400 font-medium rounded-lg transition-colors duration-200"
                    >
                        Logout
                    </button>
                </div>
                <div id="auth-buttons" class="flex space-x-3">
                    <a href="/login.html" class="px-4 py-2 bg-white/10 hover:bg-white/20 border border-white/20 rounded-lg text-sm font-medium text-white transition-all duration-200">
                        Login
                    </a>
                    <a href="/login.html" class="ml-2 px-4 py-2 bg-blue-500/20 hover:bg-blue-500/30 text-white font-semibold rounded-lg transition-all duration-200">
                        Sign Up
                    </a>
                </div>
            </div>

            <!-- Form -->
            <form id="shorten-form" class="space-y-4">
                <div class="space-y-2">
                    <label for="url-input" class="block text-sm font-medium text-white/90">
                        Enter URL to shorten:
                    </label>
                    <input
                        type="url"
                        id="url-input"
                        required
                        class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400/50 text-white placeholder-white/60 transition-all duration-200"
                        placeholder="https://example.com/very/long/url"
                    />
                </div>

                <button
                    type="submit"
                    id="shorten-btn"
                    class="w-full bg-blue-500/20 hover:bg-blue-500/30 active:bg-blue-500/40 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98]"
                >
                    Shorten URL
                </button>
            </form>

            <!-- Result Section -->
            <div id="result" class="mt-6 hidden">
                <div class="bg-white/10 backdrop-blur-sm border border-white/20 rounded-lg p-6 space-y-4">
                    <p class="mb-2 text-sm font-medium text-white/90">
                        Your short URL:
                    </p>
                    <div class="flex items-center space-x-3">
                        <input
                            type="text"
                            id="short-url-output"
                            readonly
                            class="flex-1 bg-white/10 border border-white/20 rounded-lg px-4 py-3 text-sm text-white focus:outline-none"
                        />
                        <button
                            id="copy-btn"
                            class="bg-green-500/20 hover:bg-green-500/30 active:bg-green-500/40 text-green-400 font-semibold py-3 px-6 rounded-lg transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98]"
                        >
                            Copy
                        </button>
                    </div>
                </div>
            </div>

            <!-- Error Section -->
            <div id="error" class="mt-4 hidden text-red-400 text-center"></div>

            <!-- Recent Links Section -->
            <div id="recent-links" class="mt-8">
                <h2 class="text-sm font-medium text-white/80 mb-3">
                    Recent Links
                </h2>
                <div id="recent-links-container" class="space-y-2"></div>
            </div>
        </div>
    </div>

<script>
    // Check auth status on page load
    document.addEventListener('DOMContentLoaded', () => {
        checkAuthStatus();
        loadRecentLinks();
    });

    // Check authentication status
    async function checkAuthStatus() {
        try {
            const response = await fetch('/auth/me', {
                credentials: 'include'
            });

            if (response.ok) {
                const userData = await response.json();
                showUserInfo(userData);
            } else {
                hideUserInfo();
            }
        } catch (error) {
            hideUserInfo();
        }
    }

    // Show user info in header
    function showUserInfo(userData) {
        document.getElementById('user-info').classList.remove('hidden');
        document.getElementById('auth-buttons').classList.add('hidden');

        // Set user initials (first letter of first and last name, or first two letters of email)
        const nameParts = userData.name ? userData.name.split(' ') : [];
        if (nameParts.length >= 2) {
            document.getElementById('user-initials').textContent =
                (nameParts[0][0] + nameParts[1][0]).toUpperCase();
        } else if (userData.email) {
            const emailPrefix = userData.email.split('@')[0];
            document.getElementById('user-initials').textContent =
                emailPrefix.substring(0, 2).toUpperCase();
        } else {
            document.getElementById('user-initials').textContent = 'U';
        }

        document.getElementById('user-name').textContent = userData.name || userData.email || 'User';
        document.getElementById('user-email').textContent = userData.email || '';
    }

    // Hide user info and show auth buttons
    function hideUserInfo() {
        document.getElementById('user-info').classList.add('hidden');
        document.getElementById('auth-buttons').classList.remove('hidden');
    }

    // Logout functionality
    document.getElementById('logout-btn')?.addEventListener('click', async (e) => {
        e.preventDefault();

        try {
            const response = await fetch('/auth/logout', {
                method: 'POST',
                credentials: 'include'
            });

            if (response.ok) {
                hideUserInfo();
                // Reload page to clear any cached state
                window.location.reload();
            }
        } catch (error) {
            console.error('Logout error:', error);
        }
    });

    document.getElementById('shorten-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();

        const urlInput = document.getElementById('url-input');
        const shortenBtn = document.getElementById('shorten-btn');
        const resultDiv = document.getElementById('result');
        const shortUrlOutput = document.getElementById('short-url-output');
        const copyBtn = document.getElementById('copy-btn');
        const errorDiv = document.getElementById('error');

        const url = urlInput.value.trim();

        if (!url) {
            errorDiv.textContent = 'Please enter a URL';
            errorDiv.classList.remove('hidden');
            return;
        }

        shortenBtn.disabled = true;
        shortenBtn.innerHTML = `
            <span>Shortening...</span>
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
            </svg>
        `;
        errorDiv.classList.add('hidden');

        try {
            const response = await fetch('/shorten', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                credentials: 'include',
                body: JSON.stringify({ url }),
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || 'Failed to shorten URL');
            }

            const data = await response.json();
            shortUrlOutput.value = data.shortUrl;

            // Add entrance animation to result div
            resultDiv.classList.remove('hidden');
            resultDiv.style.opacity = '0';
            resultDiv.style.transform = 'translateY(20px)';
            requestAnimationFrame(() => {
                resultDiv.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                resultDiv.style.opacity = '1';
                resultDiv.style.transform = 'translateY(0)';
            });

            // Save to recent links
            saveRecentLink(data.shortUrl, urlInput.value);

        } catch (error) {
            errorDiv.textContent = error.message || 'An error occurred';
            errorDiv.classList.remove('hidden');
        } finally {
            shortenBtn.disabled = false;
            shortenBtn.innerHTML = 'Shorten URL';
        }
    });

    document.getElementById('copy-btn')?.addEventListener('click', () => {
        const shortUrlOutput = document.getElementById('short-url-output');
        shortUrlOutput.select();
        document.execCommand('copy');

        const copyBtn = document.getElementById('copy-btn');
        const originalText = copyBtn.textContent;
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.remove('bg-green-500/20', 'hover:bg-green-500/30', 'active:bg-green-500/40');
        copyBtn.classList.add('bg-green-500', 'text-white');

        setTimeout(() => {
            copyBtn.textContent = originalText;
            copyBtn.classList.remove('bg-green-500', 'text-white');
            copyBtn.classList.add('bg-green-500/20', 'hover:bg-green-500/30', 'active:bg-green-500/40');
        }, 2000);
    });

    // Recent Links Functions
    function saveRecentLink(shortUrl, originalUrl) {
        const recentLinks = JSON.parse(localStorage.getItem('recentLinks') || '[]');

        // Add new link to the beginning
        recentLinks.unshift({ shortUrl, originalUrl, timestamp: Date.now() });

        // Keep only last 3 links
        const limitedLinks = recentLinks.slice(0, 3);

        // Save back to localStorage
        localStorage.setItem('recentLinks', JSON.stringify(limitedLinks));

        // Update UI
        loadRecentLinks();
    }

    function loadRecentLinks() {
        const recentLinks = JSON.parse(localStorage.getItem('recentLinks') || '[]');
        const container = document.getElementById('recent-links-container');

        if (!container) return;

        // Clear current links
        container.innerHTML = '';

        if (recentLinks.length === 0) {
            container.innerHTML = '<p class="text-xs text-white/60 italic">No recent links</p>';
            return;
        }

        // Add each link
        recentLinks.forEach((link, index) => {
            const linkElement = document.createElement('div');
            linkElement.className = 'flex items-center justify-between px-3 py-2 bg-white/5 backdrop-blur-sm rounded border border-white/10';
            linkElement.innerHTML = `
                <div class="flex-1">
                    <a href="${link.shortUrl}" target="_blank" class="text-white/90 hover:text-white break-all truncate max-w-xs">${link.shortUrl}</a>
                    <div class="text-xs text-white/60 mt-1">${link.originalUrl}</div>
                </div>
                <button
                    onclick="copyToClipboard('${link.shortUrl}')"
                    class="text-xs text-blue-400 hover:text-blue-300 p-1 rounded"
                >
                    Copy
                </button>
            `;
            container.appendChild(linkElement);
        });
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            // Show temporary feedback
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = 'Copied!';
            btn.classList.remove('text-blue-400', 'hover:text-blue-300');
            btn.classList.add('text-green-400');

            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('text-green-400');
                btn.classList.add('text-blue-400', 'hover:text-blue-300');
            }, 1500);
        }).catch(err => {
            console.error('Failed to copy: ', err);
        });
    }
</script>
</body>
</html>
